<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Desktop - flasher.cloud</title>
    <link rel="stylesheet" href="./style-options.css" />
  </head>
  <body class="retro">
    <main class="desktop">
      <div class="window-bar"><span>flasher.cloud utility manager</span><a href="./siteStyleOptions.html">close</a></div>
      <div class="retro-grid">
        <aside class="window">
          <div class="window-bar"><span>devices.exe</span><span>_ x</span></div>
          <div class="window-content">
            <p>ESP32</p>
            <p>STM32 DFU</p>
            <p>RP2040</p>
            <p>Arduino</p>
            <p>Generic UART</p>
          </div>
        </aside>
        <section class="window">
          <div class="window-bar"><span>flash-workbench.html</span><span>_ [] x</span></div>
          <div class="window-content">
            <img class="retro-logo" src="./logo.svg" alt="" />
            <p class="eyebrow">Classic desktop utility</p>
            <h1>Browser flashing in a windowed tool.</h1>
            <p>Old-school utility styling with clear windows, strong borders, and a serial-program feel.</p>
            <div class="actions"><a class="button" href="#">Connect</a><a class="button" href="#">Open log</a></div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
